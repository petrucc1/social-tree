<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <title>Social Tree</title>
</head>
<body>
    <main>
        <div class="initial">
            <img class="img-main" src="./assets/black-woman.png" alt="Fotografia de uma mulher negra olhando para a esquerda.">
            <p>@instagram</p>
        </div>
        <div class="links">
            <a class="clickable-links" href="#">LINK 1</a>
            <a class="clickable-links" href="#">LINK 2</a>
            <a class="clickable-links" href="#">LINK 3</a>
            <a class="clickable-links" href="#">LINK 4</a>
        </div>
        <div class="social-networks">
            <a href="https://twitter.com/"><img class="icon-social-networks" src="./assets/twitter.svg" alt=""></a>
            <a href="https://www.twitch.tv/"><img class="icon-social-networks" src="./assets/twitch.svg" alt=""></a>
            <a href="https://www.instagram.com/"><img class="icon-social-networks" src="./assets/instagram.svg" alt=""></a>
            <a href="https://www.linkedin.com/feed/"><img class="icon-social-networks" src="./assets/linkedin.svg" alt=""></a>
            <a href="https://github.com/"><img class="icon-social-networks" src="./assets/github.svg" alt="Logo do site Github."></a>
        </div>
    </main>
</body>
</html>
